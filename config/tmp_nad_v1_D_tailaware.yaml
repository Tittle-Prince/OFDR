phase4a:
  seed: 42
  dataset_path: data/processed/dataset_c_phase4a_shift004_linewidth_l3.npz
  results_dir: results/phase4a_shift004_linewidth_l3
train:
  batch_size: 128
  lr: 0.001
  weight_decay: 0.0
  epochs: 45
  patience: 10
  loss:
    name: tail_aware_l1
    tau: 0.01
    lambda_tail: 3.0
  hard_weighting:
    enabled: false
    tau: 0.01
    alpha: 1.5
model:
  name: nad_net_v1
  use_derivative_input: true
  use_aux_head: true
  lambda_aux: 0.1
  base_channels: 32
  local_kernel: 3
  context_kernel: 9
  context_dilation: 2
method_enhance:
  method_label: D_NADNetV1_3ch_aux_tailaware
  results_subdir: method_enhance_nad_v1_D_tailaware
  seed_offset: 21
