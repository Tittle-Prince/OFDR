phase4a:
  seed: 42
  dataset_path: "data/processed/dataset_b_array_se_easy.npz"
  results_dir: "results/phase4_array_se_easy"

array:
  n_gratings: 5
  target_index: 2
  lambda0_nm: 1550.0
  linewidth_sigma_nm: 0.08
  amplitude: 1.0
  wavelength_start_nm: 1549.0
  wavelength_end_nm: 1551.0
  num_points: 512

array_random:
  amplitude_scale_min: 0.88
  amplitude_scale_max: 1.12
  linewidth_scale_min: 0.90
  linewidth_scale_max: 1.12

label:
  delta_lambda_target_min_nm: -0.2
  delta_lambda_target_max_nm: 0.8
  delta_lambda_neighbors_nm: 0.0

  neighbor_shift_mode: "random_per_neighbor"
  neighbor_delta_lambda_min_nm: -0.08
  neighbor_delta_lambda_max_nm: 0.08
  neighbor_target_coupling: 0.12
  neighbor_jitter_min_nm: -0.01
  neighbor_jitter_max_nm: 0.01

local_window:
  center_weight: 1.0
  first_neighbor_weight: 0.35
  second_neighbor_weight: 0.15
  additive_noise_std: 0.004
  additive_noise_std_min: 0.001
  additive_noise_std_max: 0.008
  normalize: "minmax_per_sample"
  clip_to_nonnegative: true

  target_window_shift_min_nm: -0.02
  target_window_shift_max_nm: 0.02
  neighbor_mode_options: [2, 4]

  first_neighbor_left_weight_min: 0.18
  first_neighbor_left_weight_max: 0.48
  first_neighbor_right_weight_min: 0.18
  first_neighbor_right_weight_max: 0.48

  second_neighbor_left_weight_min: 0.05
  second_neighbor_left_weight_max: 0.22
  second_neighbor_right_weight_min: 0.05
  second_neighbor_right_weight_max: 0.22

  leakage_global_scale_min: 0.85
  leakage_global_scale_max: 1.20
  leakage_left_right_tilt_min: -0.18
  leakage_left_right_tilt_max: 0.18

  baseline_offset_min: -0.02
  baseline_offset_max: 0.02
  baseline_num_components_min: 2
  baseline_num_components_max: 4
  baseline_component_amp_min: 0.002
  baseline_component_amp_max: 0.015
  baseline_freq_min: 0.3
  baseline_freq_max: 2.5

  hf_ripple_amp_min: 0.0
  hf_ripple_amp_max: 0.010
  hf_ripple_freq_min: 6.0
  hf_ripple_freq_max: 18.0
  hf_ripple_phase_min: 0.0
  hf_ripple_phase_max: 6.283185307179586

  colored_noise_std_min: 0.0
  colored_noise_std_max: 0.006
  colored_noise_smooth_points_min: 4.0
  colored_noise_smooth_points_max: 18.0

  dropout_prob: 0.08
  dropout_count_min: 1
  dropout_count_max: 2
  dropout_width_points_min: 4.0
  dropout_width_points_max: 16.0
  dropout_depth_min: 0.05
  dropout_depth_max: 0.20

  impulse_prob: 0.06
  impulse_count_min: 1
  impulse_count_max: 2
  impulse_amp_min: 0.005
  impulse_amp_max: 0.020

  instrument_blur_sigma_points_min: 0.0
  instrument_blur_sigma_points_max: 0.9

  gain_min: 0.92
  gain_max: 1.10
  post_bias_min: -0.01
  post_bias_max: 0.01
  gamma_min: 0.95
  gamma_max: 1.08
  saturation_level_min: 0.0
  saturation_level_max: 0.0

se_regimes:
  - name: "baseline_dominant"
    prob: 0.28
    baseline_scale: 1.4
    noise_scale: 0.9
    leakage_scale: 1.05

  - name: "leakage_dominant"
    prob: 0.28
    leakage_scale: 1.45
    noise_scale: 0.9
    shift_scale: 1.1
    neighbor_shift_scale: 1.15

  - name: "noise_dominant"
    prob: 0.22
    leakage_scale: 0.95
    noise_scale: 1.45
    colored_noise_scale: 1.5
    impulse_scale: 1.4
    dropout_scale: 1.3

  - name: "mixed_mild"
    prob: 0.22
    leakage_scale: 1.25
    noise_scale: 1.2
    baseline_scale: 1.2
    ripple_scale: 1.2
    shift_scale: 1.15
    neighbor_shift_scale: 1.2

dataset:
  num_samples: 12000
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15

compare:
  fit_window_points: 61
  baseline_percentile: 10.0

train:
  batch_size: 128
  lr: 0.001
  weight_decay: 0.0
  epochs: 55
  patience: 12
